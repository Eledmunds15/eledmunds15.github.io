<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Title and description are set from content.json -->
  <title>Ethan Edmunds</title>
  <meta name="description" content=""/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>

    /* ============================================================
       ACCENT COLOUR — change this one value to restyle the site
       Try: #3b82f6 (blue) | #f59e0b (amber) | #10b981 (green)
            #e11d48 (red)   | #8b5cf6 (purple) | #ffffff (white)
       ============================================================ */
    :root {
      --accent:    #3b82f6;

      --bg:        #0c0c0c;
      --surface:   #141414;
      --surface2:  #1a1a1a;
      --border:    #222222;
      --border-lt: #2e2e2e;
      --text:      #f5f5f5;
      --text-2:    #a0a0a0;
      --text-3:    #555555;
      --font:      'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 2px; }

    /* ── NAV ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(12,12,12,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .nav-wordmark {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-2);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 2.5rem;
      max-width: 900px;
      margin: 0 auto;
      padding-top: 60px;
    }

    .hero-kicker {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: up 0.7s 0.1s ease forwards;
    }

    .hero-name {
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: up 0.7s 0.2s ease forwards;
    }

    .hero-tagline {
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 300;
      color: var(--text-2);
      max-width: 580px;
      line-height: 1.65;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: up 0.7s 0.3s ease forwards;
    }

    .hero-tagline strong { color: var(--text); font-weight: 500; }

    .hero-btns {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: up 0.7s 0.4s ease forwards;
    }

    .btn {
      display: inline-block;
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 0.7rem 1.6rem;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border-lt);
    }
    .btn-ghost:hover { border-color: var(--text-2); color: var(--text); transform: translateY(-1px); }

    .hero-footnote {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: up 0.7s 0.55s ease forwards;
    }

    .fn-label {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.25rem;
    }

    .fn-val {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-2);
    }

    /* ── SHARED SECTION ── */
    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 6rem 2.5rem;
      border-top: 1px solid var(--border);
    }

    .section-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 2.5rem;
      line-height: 1.2;
    }

    /* ── WORK & INTERESTS — 3-COL CARD GRID ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-grid-item {
      background: var(--surface);
      padding: 1.8rem;
      transition: background 0.2s;
    }

    .card-grid-item:hover { background: var(--surface2); }

    .card-n {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .card-label {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
      margin-bottom: 0.8rem;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .card-org {
      font-size: 0.72rem;
      color: var(--text-3);
      letter-spacing: 0.03em;
      margin-bottom: 0.8rem;
    }

    .card-body {
      font-size: 0.82rem;
      color: var(--text-2);
      line-height: 1.75;
    }

    .section-footnote {
      margin-top: 1.2rem;
      font-size: 0.72rem;
      color: var(--text-3);
      text-decoration: none;
      letter-spacing: 0.03em;
      display: inline-block;
      transition: color 0.15s;
    }
    .section-footnote:hover { color: var(--text-2); }

    /* ── INTERESTS — EXPANDABLE IMAGE CARDS ── */
    .interest-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .interest-card {
      position: relative;
      cursor: pointer;
    }

    .interest-card-header {
      position: relative;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.6rem 2rem;
      background-size: cover;
      background-position: center;
    }

    .interest-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(12,12,12,0.25) 0%, rgba(12,12,12,0.88) 100%);
      transition: background 0.3s ease;
    }

    .interest-card:hover .interest-card-overlay { background: linear-gradient(to bottom, rgba(12,12,12,0.15) 0%, rgba(12,12,12,0.78) 100%); }

    .interest-card-header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }

    .interest-card-n {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .interest-card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .interest-card-toggle {
      width: 26px;
      height: 26px;
      border: 1px solid rgba(245,245,245,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--text-2);
      flex-shrink: 0;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s, transform 0.35s ease;
      user-select: none;
    }

    .interest-card.open .interest-card-toggle {
      border-color: var(--accent);
      color: var(--accent);
      transform: rotate(45deg);
    }

    .interest-card-body {
      max-height: 0;
      overflow: hidden;
      background: var(--surface);
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .interest-card.open .interest-card-body { max-height: 300px; }

    .interest-card-body-inner {
      padding: 1.5rem 2rem 1.8rem;
    }

    .interest-card-body-inner p {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.8;
    }

    /* ── RESEARCH — FILTER + STACKED CARDS ── */
    .research-filter {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border-radius: 100px;
      border: 1px solid var(--border-lt);
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--text-3); color: var(--text-2); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .research-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .research-item-wrap {
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.3s ease,
                  margin-top 0.35s ease;
      max-height: 600px;
    }

    .research-item-wrap.hidden {
      max-height: 0;
      opacity: 0;
      margin-top: -1rem;
      pointer-events: none;
    }

    .research-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.8rem 2rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s, transform 0.5s, border-color 0.2s;
    }

    .research-item.reveal { opacity: 1; transform: none; }
    .research-item:hover { border-color: var(--border-lt); }

    .badge-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 3px;
    }

    .badge-active {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .badge-pub {
      background: rgba(245,245,245,0.06);
      color: var(--text-2);
      border: 1px solid var(--border-lt);
    }

    .badge-project {
      background: rgba(16,185,129,0.1);
      color: #10b981;
      border: 1px solid rgba(16,185,129,0.25);
    }

    .research-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0.7rem;
    }

    .research-desc {
      font-size: 0.85rem;
      color: var(--text-2);
      line-height: 1.75;
      margin-bottom: 1rem;
    }

    .research-link {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }

    .research-link:hover { opacity: 0.75; }

    /* ── CONTACT ── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-intro {
      font-size: 0.95rem;
      color: var(--text-2);
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .contact-sub {
      font-size: 0.82rem;
      color: var(--text-3);
      line-height: 1.7;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-2);
      font-size: 0.82rem;
      transition: background 0.15s, color 0.15s;
    }

    .contact-link:last-child { border-bottom: none; }
    .contact-link:hover { background: var(--surface2); color: var(--text); }

    .contact-link-type {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      min-width: 60px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.8rem 2.5rem;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-wordmark {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-3);
      text-decoration: none;
    }

    .footer-copy {
      font-size: 0.68rem;
      color: var(--text-3);
    }

    /* ── ANIMATIONS ── */
    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      nav { padding: 0 1.5rem; }
      .nav-links { display: none; }
      .hero, .section { padding-left: 1.5rem; padding-right: 1.5rem; }
      .card-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
      footer { flex-direction: column; gap: 0.75rem; text-align: center; }
    }

  </style>
</head>
<body>

  <nav id="nav"></nav>
  <div id="hero"></div>
  <main id="main"></main>
  <footer id="footer"></footer>

  <script>
    // ── RENDER HELPERS ────────────────────────────────────────────

    function el(tag, cls, html) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    }

    function txt(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      e.textContent = text;
      return e;
    }

    // ── RENDERERS ─────────────────────────────────────────────────

    function renderNav(d) {
      const nav = document.getElementById('nav');

      const wordmark = el('a', 'nav-wordmark');
      wordmark.href = '#';
      wordmark.textContent = d.wordmark;

      const ul = el('ul', 'nav-links');
      d.links.forEach(link => {
        const li = document.createElement('li');
        const a = el('a');
        a.href = link.href;
        a.textContent = link.label;
        li.appendChild(a);
        ul.appendChild(li);
      });

      nav.setAttribute('aria-label', 'Main navigation');
      nav.appendChild(wordmark);
      nav.appendChild(ul);
    }

    function renderHero(d) {
      const root = document.getElementById('hero');
      root.className = 'hero';

      const kicker = txt('p', 'hero-kicker', d.kicker);

      const name = txt('h1', 'hero-name', d.name);

      const tagline = el('p', 'hero-tagline', d.tagline);

      const btns = el('div', 'hero-btns');
      d.buttons.forEach(b => {
        const a = el('a', `btn btn-${b.style}`);
        a.href = b.href;
        a.textContent = b.label;
        btns.appendChild(a);
      });

      const footnote = el('div', 'hero-footnote');
      d.footnotes.forEach(f => {
        const item = el('div', 'fn-item');
        item.appendChild(txt('div', 'fn-label', f.label));
        item.appendChild(txt('div', 'fn-val', f.value));
        footnote.appendChild(item);
      });

      [kicker, name, tagline, btns, footnote].forEach(n => root.appendChild(n));
    }

    function renderCardGrid(d, withLinkedIn) {
      const section = el('section', 'section');
      section.id = d.tag.toLowerCase().replace(/\s+/g, '-');

      section.appendChild(txt('p', 'section-tag', d.tag));
      section.appendChild(txt('h2', 'section-title', d.title));

      const grid = el('div', 'card-grid');

      d.cards.forEach(card => {
        const item = el('div', 'card-grid-item');

        item.appendChild(txt('div', 'card-n', card.n));

        if (card.label) {
          item.appendChild(txt('div', 'card-label', card.label));
        }

        item.appendChild(txt('h3', 'card-title', card.title));

        if (card.org) {
          item.appendChild(txt('p', 'card-org', card.org));
        }

        item.appendChild(el('p', 'card-body', card.body));

        grid.appendChild(item);
      });

      section.appendChild(grid);

      if (withLinkedIn) {
        const link = el('a', 'section-footnote');
        link.href = 'https://linkedin.com/in/ethanedmunds';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = 'Full CV on LinkedIn →';
        section.appendChild(link);
      }

      return section;
    }

    function renderInterests(d) {
      const section = el('section', 'section');
      section.id = 'interests';

      section.appendChild(txt('p', 'section-tag', d.tag));
      section.appendChild(txt('h2', 'section-title', d.title));

      const list = el('div', 'interest-list');

      d.cards.forEach((card, i) => {
        const item = el('div', 'interest-card');

        // Header with gradient/image backdrop
        const header = el('div', 'interest-card-header');
        const bg = card.image ? `url(${card.image})` : card.gradient;
        header.style.background = bg;
        header.style.backgroundSize = 'cover';
        header.style.backgroundPosition = 'center';

        const overlay = el('div', 'interest-card-overlay');

        const headerContent = el('div', 'interest-card-header-content');
        const meta = el('div');
        meta.appendChild(txt('div', 'interest-card-n', card.n));
        meta.appendChild(txt('h3', 'interest-card-title', card.title));

        const toggle = el('div', 'interest-card-toggle');
        toggle.textContent = '+';
        toggle.setAttribute('aria-hidden', 'true');

        headerContent.appendChild(meta);
        headerContent.appendChild(toggle);
        header.appendChild(overlay);
        header.appendChild(headerContent);

        // Body
        const body = el('div', 'interest-card-body');
        const inner = el('div', 'interest-card-body-inner');
        inner.appendChild(el('p', null, card.body));
        body.appendChild(inner);

        item.appendChild(header);
        item.appendChild(body);
        list.appendChild(item);

        // Toggle behaviour — accordion (one open at a time)
        header.addEventListener('click', () => {
          const isOpen = item.classList.contains('open');
          list.querySelectorAll('.interest-card.open').forEach(c => c.classList.remove('open'));
          if (!isOpen) item.classList.add('open');
        });
      });

      section.appendChild(list);
      return section;
    }

    function renderResearch(d) {
      const section = el('section', 'section');
      section.id = 'research';

      section.appendChild(txt('p', 'section-tag', d.tag));
      section.appendChild(txt('h2', 'section-title', d.title));

      // Filter bar
      const filterBar = el('div', 'research-filter');
      const list = el('div', 'research-list');

      d.filters.forEach((label, i) => {
        const btn = el('button', 'filter-btn' + (i === 0 ? ' active' : ''));
        btn.textContent = label;
        btn.dataset.filter = label.toLowerCase();
        btn.addEventListener('click', () => {
          filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const active = btn.dataset.filter;
          list.querySelectorAll('.research-item-wrap').forEach(wrap => {
            const match = active === 'all' || wrap.dataset.type === active;
            if (match) {
              wrap.classList.remove('hidden');
              // Ensure inner card is revealed if it was already in viewport
              wrap.querySelector('.research-item').classList.add('reveal');
            } else {
              wrap.classList.add('hidden');
            }
          });
        });
        filterBar.appendChild(btn);
      });

      d.items.forEach(item => {
        const wrap = el('div', 'research-item-wrap');
        wrap.dataset.type = item.type;

        const card = el('div', 'research-item');

        const badges = el('div', 'badge-row');
        item.badges.forEach(b => {
          badges.appendChild(txt('span', `badge badge-${b.type}`, b.text));
        });
        card.appendChild(badges);

        card.appendChild(txt('h3', 'research-title', item.title));
        card.appendChild(el('p', 'research-desc', item.description));

        if (item.link) {
          const a = el('a', 'research-link');
          a.href = item.link.href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = item.link.label;
          card.appendChild(a);
        }

        wrap.appendChild(card);
        list.appendChild(wrap);
      });

      section.appendChild(filterBar);
      section.appendChild(list);
      return section;
    }

    function renderContact(d) {
      const section = el('section', 'section');
      section.id = 'contact';

      section.appendChild(txt('p', 'section-tag', d.tag));
      section.appendChild(txt('h2', 'section-title', d.title));

      const grid = el('div', 'contact-grid');

      const left = el('div');
      left.appendChild(txt('p', 'contact-intro', d.intro));
      left.appendChild(txt('p', 'contact-sub', d.sub));

      const right = el('div', 'contact-links');
      d.links.forEach(link => {
        const a = el('a', 'contact-link');
        a.href = link.href;
        if (!link.href.startsWith('mailto:')) {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
        a.appendChild(txt('span', 'contact-link-type', link.type));
        a.appendChild(document.createTextNode(link.label));
        right.appendChild(a);
      });

      grid.appendChild(left);
      grid.appendChild(right);
      section.appendChild(grid);
      return section;
    }

    function renderFooter(d) {
      const footer = document.getElementById('footer');

      const wordmark = el('a', 'footer-wordmark');
      wordmark.href = '#';
      wordmark.textContent = d.wordmark;

      const copy = txt('span', 'footer-copy', d.copy);

      footer.appendChild(wordmark);
      footer.appendChild(copy);
    }

    // ── SCROLL REVEAL ─────────────────────────────────────────────

    function initScrollReveal() {
      const targets = document.querySelectorAll('.research-item');
      const observer = new IntersectionObserver(entries => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add('reveal'), i * 80);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });
      targets.forEach(t => observer.observe(t));
    }

    // ── INIT ──────────────────────────────────────────────────────

    async function init() {
      let data;
      try {
        const res = await fetch('./content.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        document.body.innerHTML = `
          <div style="padding:4rem 2.5rem;font-family:system-ui;color:#a0a0a0">
            <p style="color:#f5f5f5;font-weight:600;margin-bottom:0.5rem">Could not load content.json</p>
            <p style="font-size:0.85rem">Open the site via a local server rather than opening the HTML file directly.<br>
            Run: <code style="background:#1a1a1a;padding:0.2rem 0.4rem;border-radius:3px">python3 -m http.server</code>
            then visit <code style="background:#1a1a1a;padding:0.2rem 0.4rem;border-radius:3px">http://localhost:8000</code></p>
          </div>`;
        return;
      }

      document.title = data.meta.title;
      document.querySelector('meta[name="description"]').content = data.meta.description;

      renderNav(data.nav);
      renderHero(data.hero);

      const main = document.getElementById('main');

      const workSection = renderCardGrid(data.work, true);
      workSection.id = 'work';
      main.appendChild(workSection);

      main.appendChild(renderInterests(data.interests));
      main.appendChild(renderResearch(data.research));
      main.appendChild(renderContact(data.contact));

      renderFooter(data.footer);

      initScrollReveal();
    }

    init();
  </script>

</body>
</html>
